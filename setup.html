<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Setup - AccessControl</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(20px); border-radius: 16px; padding: 2.5rem; max-width: 420px; width: 100%; text-align: center; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p  { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .status { padding: 1rem; border-radius: 10px; font-size: 0.875rem; font-weight: 600; margin-top: 1.5rem; }
    .status.loading { background: rgba(37,99,235,0.2); border: 1px solid rgba(37,99,235,0.4); color: #93c5fd; }
    .status.success { background: rgba(22,163,74,0.2); border: 1px solid rgba(22,163,74,0.4); color: #86efac; }
    .status.error   { background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.4); color: #fca5a5; }
    .credentials { margin-top: 1.25rem; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 1rem; text-align: left; font-size: 0.875rem; }
    .credentials div { margin-bottom: 0.4rem; }
    .credentials span { color: rgba(255,255,255,0.5); }
    .btn { display: inline-block; margin-top: 1.5rem; padding: 0.7rem 1.5rem; background: #2563eb; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .btn:hover { background: #1d4ed8; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <h1>⚙️ Setup Inicial</h1>
    <p>Esta página crea el usuario administrador en Supabase. Ejecútala una sola vez.</p>
    <div id="status" class="status loading">
      <span class="spinner"></span> Creando usuario admin...
    </div>
  </div>

  <script type="module">
    import { supabase } from '/supabase.js'

    const ADMIN_EMAIL    = 'admin@empresa.com'
    const ADMIN_PASSWORD = 'Admin1234'
    const ADMIN_NAME     = 'Admin'

    const statusEl = document.getElementById('status')

    function setStatus(msg, type, extra = '') {
      statusEl.className = 'status ' + type
      statusEl.innerHTML = msg + extra
    }

    try {
      // Try to sign up the admin
      const { data, error } = await supabase.auth.signUp({
        email:    ADMIN_EMAIL,
        password: ADMIN_PASSWORD,
        options:  { data: { name: ADMIN_NAME, role: 'Admin' } }
      })

      if (error && !error.message.includes('already registered')) {
        throw error
      }

      const userId = data?.user?.id

      if (userId) {
        // Upsert the profile row
        await supabase.from('profiles').upsert({
          id:          userId,
          name:        ADMIN_NAME,
          email:       ADMIN_EMAIL,
          role:        'Admin',
          status:      'Active',
          last_access: 'Nunca'
        }, { onConflict: 'id' })
      }

      setStatus('✅ Usuario Admin creado correctamente.', 'success', `
        <div class="credentials">
          <div><span>Email: </span><strong>${ADMIN_EMAIL}</strong></div>
          <div><span>Contraseña: </span><strong>${ADMIN_PASSWORD}</strong></div>
        </div>
        <a class="btn" href="/login.html">Ir al Login →</a>
      `)

    } catch (err) {
      if (err.message && err.message.includes('already registered')) {
        setStatus('ℹ️ El usuario admin ya existe.', 'success', `
          <div class="credentials">
            <div><span>Email: </span><strong>${ADMIN_EMAIL}</strong></div>
            <div><span>Contraseña: </span><strong>${ADMIN_PASSWORD}</strong></div>
          </div>
          <a class="btn" href="/login.html">Ir al Login →</a>
        `)
      } else {
        setStatus('❌ Error: ' + (err.message || 'desconocido'), 'error')
        console.error(err)
      }
    }
  </script>
</body>
</html>
